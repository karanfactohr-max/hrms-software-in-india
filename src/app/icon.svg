<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="100" x2="100" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3CB371"/>
      <stop offset="100%" stop-color="#CFF25E"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>

  <!-- Left rising column (charcoal) -->
  <rect x="18" y="28" width="24" height="54" rx="12" fill="url(#g2)"/>

  <!-- Center sweeping connector (green) -->
  <path d="M30 60 C 45 60, 50 35, 70 35" stroke="url(#g1)" stroke-width="20" stroke-linecap="round" fill="none"/>

  <!-- Right elevated bar (green) -->
  <rect x="58" y="16" width="24" height="40" rx="12" fill="url(#g1)"/>

  <!-- Bottom-right node (charcoal), represents human element -->
  <circle cx="70" cy="74" r="12" fill="url(#g2)"/>
</svg>
